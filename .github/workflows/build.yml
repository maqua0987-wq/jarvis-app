name: Build Android APK with Buildozer

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y git zip unzip openjdk-17-jdk python3-pip autoconf automake libtool pkg-config zlib1g-dev

    - name: Install Buildozer and Cython
      run: |
        pip install --upgrade pip
        pip install buildozer cython==0.29.33

    - name: Setup Android SDK and Accept Licenses
      run: |
        mkdir -p $HOME/android-cmdline
        cd $HOME/android-cmdline
        curl -o commandlinetools.zip https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip
        unzip commandlinetools.zip && rm commandlinetools.zip
        mkdir -p cmdline-tools/latest
        mv cmdline-tools/* cmdline-tools/latest/ 2>/dev/null || true
        export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64
        yes | ./cmdline-tools/latest/bin/sdkmanager --sdk_root=$HOME/android-sdk --licenses

    - name: Run Buildozer Build
      run: |
        buildozer android debug
      env:
        TERM: xterm
        ANDROID_SDK_HOME: /home/runner/android-sdk
        
